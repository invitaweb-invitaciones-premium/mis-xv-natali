
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Natalí · Mis XV</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:#0a0a0a;color:#fff;
  font-family:'Raleway',sans-serif;
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;position:relative;
}

/* ═══ FOTO SUPERIOR ═══ */
.photo-hero{
  position:relative;width:100%;height:46vh;min-height:320px;max-height:460px;
  overflow:hidden;background:#111 url('img/image_0.jpeg') center 20%/cover no-repeat;
}
.photo-hero::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.15) 0%,rgba(0,0,0,.05) 40%,rgba(0,0,0,.55) 100%);
}
.photo-hero.no-photo{background:#1a1a1a;}
.photo-hero.no-photo::after{content:'🌹';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:60px;opacity:.35;}
.photo-caption{
  position:absolute;left:0;right:0;bottom:16%;text-align:center;z-index:3;
}
.photo-mis{
  font-size:clamp(13px,3.4vw,17px);letter-spacing:8px;font-weight:500;
  color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.4);
}
.photo-mis::before{content:'❧ ';opacity:.8;}
.photo-name{
  font-family:'Pinyon Script',cursive;font-size:clamp(60px,17vw,100px);
  color:#fff;line-height:1;margin-top:2px;
  text-shadow:0 4px 22px rgba(0,0,0,.5);
}
/* sparkles sobre la foto */
.spk{position:absolute;color:#fff;text-shadow:0 0 6px rgba(255,255,255,.8);z-index:2;opacity:.9;animation:twinkle 2.4s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.35;transform:scale(.8);}50%{opacity:1;transform:scale(1.15);}}

/* borde rasgado tipo papel */
.torn{position:relative;width:100%;height:34px;margin-top:-2px;z-index:4;}
.torn svg{display:block;width:100%;height:100%;}
.torn-star{position:absolute;font-size:26px;color:#fff;left:2%;top:8px;text-shadow:0 0 10px rgba(255,255,255,.6);z-index:5;}

/* ═══ FONDO NEGRO ═══ */
.dark-area{width:100%;flex:1;position:relative;padding:26px 16px 40px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
.glitter-corner{position:absolute;bottom:0;left:0;width:180px;height:180px;pointer-events:none;
  background:radial-gradient(circle at 15% 90%,rgba(255,255,255,.5) 0%,rgba(255,255,255,0) 60%);}
.dust{position:absolute;border-radius:50%;background:#fff;opacity:.7;}

/* SOBRE */
.scene{position:relative;width:min(84vw,380px);cursor:pointer;z-index:10;margin-top:6px;}
.envelope-svg{width:100%;display:block;filter:drop-shadow(0 16px 34px rgba(0,0,0,.55));}
.flap{transform-box:fill-box;transform-origin:50% 0%;}

.seal-wrap{position:absolute;left:50%;bottom:31%;transform:translateX(-50%);z-index:25;}
.seal-circle{
  width:clamp(66px,16vw,80px);height:clamp(66px,16vw,80px);border-radius:50%;
  background:radial-gradient(circle at 38% 35%,#4a4a4a,#232323 55%,#000 100%);
  display:flex;align-items:center;justify-content:center;position:relative;
  box-shadow:0 6px 20px rgba(0,0,0,.6),inset 0 1px 3px rgba(255,255,255,.15);
}
.seal-icon{font-size:clamp(20px,5vw,24px);position:relative;z-index:2;filter:grayscale(.3) brightness(1.3);}

.letter{
  position:absolute;left:11%;width:78%;top:24%;z-index:5;opacity:0;pointer-events:none;
  background:linear-gradient(175deg,#fff 0%,#f2f2f2 100%);border-radius:3px;
  box-shadow:0 -4px 28px rgba(0,0,0,.3);min-height:56%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
  padding:22px 14px 24px;text-align:center;color:#1a1a1a;
}
.letter-name{font-family:'Pinyon Script',cursive;font-size:clamp(30px,7.5vw,42px);line-height:1;}
.letter-msg{font-size:clamp(12px,3vw,15px);letter-spacing:.5px;line-height:1.6;max-width:90%;color:#444;font-style:italic;}
.letter-date{font-size:clamp(9px,2.3vw,11px);letter-spacing:4px;text-transform:uppercase;margin-top:3px;color:#888;}

@keyframes flapOpen{0%{transform:rotateX(0);}100%{transform:rotateX(-175deg);}}
@keyframes sealPop{0%{transform:translateX(-50%) scale(1);opacity:1;}35%{transform:translateX(-50%) scale(1.18);opacity:.7;}100%{transform:translateX(-50%) scale(0);opacity:0;}}
@keyframes letterRise{0%{transform:translateY(0) scale(.97);opacity:0;}20%{opacity:1;}100%{transform:translateY(-52%) scale(1);opacity:1;}}
@keyframes envelopeExit{to{transform:scale(.88) translateY(16px);opacity:0;}}
.opening .flap{animation:flapOpen 1.1s .1s cubic-bezier(.4,0,.2,1) forwards;}
.opening .seal-wrap{animation:sealPop .55s .05s ease-in forwards;}
.opening .letter{animation:letterRise 1.4s .9s cubic-bezier(.2,.8,.3,1) forwards;}
.done{animation:envelopeExit .55s .1s ease-in forwards;}
.scene:not(.opening) .seal-wrap{transition:transform .2s;}
.scene:hover:not(.opening) .seal-wrap{transform:translateX(-50%) scale(1.08);}

.tap-hint{margin-top:16px;text-align:center;font-size:clamp(9px,2.5vw,11px);letter-spacing:4px;color:rgba(255,255,255,.4);text-transform:uppercase;transition:opacity .3s;}

.disco{font-size:34px;margin-top:22px;filter:drop-shadow(0 0 10px rgba(255,255,255,.35));animation:spin 6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.event-date{margin-top:8px;font-size:clamp(18px,4.6vw,24px);letter-spacing:5px;color:#e8e8e8;font-weight:300;}

#overlay{position:fixed;inset:0;background:#0a0a0a;opacity:0;pointer-events:none;z-index:100;transition:opacity .65s ease;}
#overlay.fade-in{opacity:1;pointer-events:all;}
</style>
</head>
<body>

<div class="photo-hero" id="photoHero">
  <span class="spk" style="left:8%;top:14%;font-size:18px;animation-delay:.2s;">✦</span>
  <span class="spk" style="right:10%;top:8%;font-size:14px;animation-delay:1s;">✦</span>
  <span class="spk" style="right:6%;top:52%;font-size:20px;animation-delay:.6s;">✦</span>
  <div class="photo-caption">
    <p class="photo-mis">MIS XV</p>
    <p class="photo-name">Natalí</p>
  </div>
</div>

<div class="torn">
  <svg preserveAspectRatio="none" viewBox="0 0 400 34" xmlns="http://www.w3.org/2000/svg">
    <polygon fill="#fff" points="0,0 12,9 24,2 37,13 50,4 63,16 76,6 90,14 104,3 118,12 132,5 146,17 160,7 174,15 188,4 202,13 216,6 230,16 244,3 258,14 272,7 286,17 300,5 314,13 328,4 342,15 356,7 370,16 384,3 400,10 400,34 0,34"/>
  </svg>
  <span class="torn-star">✦</span>
</div>

<div class="dark-area">
  <div class="glitter-corner"></div>
  <div id="dustLayer"></div>

  <div class="scene" id="scene" onclick="openEnvelope()">
    <div class="letter" id="letter">
      <span class="letter-name">Natalí</span>
      <span class="letter-msg">Te invito a compartir<br/>la noche más especial<br/>de mi vida</span>
      <span class="letter-date">Sábado 19 de Septiembre · 2026</span>
    </div>

    <div class="seal-wrap" id="seal-wrap">
      <div class="seal-circle">
        <svg viewBox="0 0 86 86" style="position:absolute;inset:0;width:100%;height:100%;">
          <defs><path id="cp" d="M43,43 m-31,0 a31,31 0 1,1 62,0 a31,31 0 1,1 -62,0"/></defs>
          <text font-family="Raleway,sans-serif" font-size="6" fill="rgba(255,255,255,0.75)" letter-spacing="1.2">
            <textPath href="#cp" startOffset="2%">Haz clic aquí · para ver la invitación ·</textPath>
          </text>
        </svg>
        <span class="seal-icon">🌿</span>
      </div>
    </div>

    <div class="envelope-wrap" id="envelope-wrap">
      <svg class="envelope-svg" viewBox="0 0 500 380" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="envG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#eceeef"/>
          </linearGradient>
          <linearGradient id="flapG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f7f7f8"/><stop offset="100%" stop-color="#e2e4e6"/>
          </linearGradient>
        </defs>
        <rect x="14" y="80" width="472" height="288" rx="14" fill="url(#envG)"/>
        <polygon points="14,80 250,230 14,368" fill="#dfe1e3" opacity=".55"/>
        <polygon points="486,80 250,230 486,368" fill="#dfe1e3" opacity=".55"/>
        <polygon points="14,368 250,248 486,368" fill="#d2d4d6" opacity=".6"/>
        <line x1="14" y1="80" x2="250" y2="230" stroke="rgba(0,0,0,.08)" stroke-width="1"/>
        <line x1="486" y1="80" x2="250" y2="230" stroke="rgba(0,0,0,.08)" stroke-width="1"/>
        <g class="flap" style="transform-origin:250px 80px;">
          <polygon points="14,82 250,220 486,82" fill="url(#flapG)"/>
          <line x1="14" y1="82" x2="486" y2="82" stroke="rgba(0,0,0,.06)" stroke-width="1"/>
        </g>
        <rect x="14" y="80" width="472" height="288" rx="14" fill="none" stroke="rgba(0,0,0,.08)" stroke-width="1.5"/>
      </svg>
    </div>
  </div>

  <p class="tap-hint" id="tap-hint">tocá el sobre para abrirlo ✦</p>

  <div class="disco">🪩</div>
  <p class="event-date">19.09.2026</p>
</div>

<div id="overlay"></div>

<script>
/* imagen principal: si no existe img/foto-5.jpg, muestra fondo alternativo prolijo */
(function(){
  const test=new Image();
  test.onerror=()=>document.getElementById('photoHero').classList.add('no-photo');
  test.src='img/image_0.jpeg';
})();

/* polvo/brillantina en la esquina inferior */
(function(){
  const layer=document.getElementById('dustLayer');
  for(let i=0;i<40;i++){
    const d=document.createElement('div'); d.className='dust';
    const s=1+Math.random()*3;
    d.style.cssText=[
      'width:'+s+'px','height:'+s+'px',
      'left:'+(Math.random()*30)+'%','bottom:'+(Math.random()*40)+'%',
      'opacity:'+(Math.random()*.8+.2)
    ].join(';');
    layer.appendChild(d);
  }
})();

let opened=false;
function openEnvelope(){
  if(opened)return; opened=true;
  document.getElementById('tap-hint').style.opacity='0';
  const scene=document.getElementById('scene');
  const letter=document.getElementById('letter');
  const envWrap=document.getElementById('envelope-wrap');
  scene.classList.add('opening');
  setTimeout(()=>{letter.style.zIndex='35';envWrap.style.zIndex='15';},900);
  setTimeout(()=>{
    scene.classList.add('done');
    document.getElementById('overlay').classList.add('fade-in');
    setTimeout(()=>{window.location.href='invitacion.html';},750);
  },3500);
}
</script>
</body>
</html>
