
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Natalí · Mis XV</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=IM+Fell+English:ital@0;1&family=Raleway:wght@300;400;500&family=Dancing+Script:wght@600;700&family=Pinyon+Script&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
:root{
  --rose-old:#b5737a;
  --rose-deep:#8b4a52;
  --gold:#c9a96e;
  --gold-light:#e8d5a3;
  --beige:#f5ece0;
  --beige2:#ede0cc;
  --cream:#fdf8f2;
  --text:#3a2a1e;
  --text2:#6b4e3d;
  --seal:#6e1f2e;
  --fucsia-lila:#96505a;
}
body{
  background-color:#f2e0d4;
  background-image:url('bg-natali.png');
  background-size:cover;
  background-position:center;
  font-family:'Cormorant Garamond',serif;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;min-height:100dvh;
  position:relative;overflow:hidden;
  padding:16px;
}

/* PÉTALOS / CONFETTI dorado */
#petals{position:fixed;inset:0;pointer-events:none;z-index:1;}
.petal{position:absolute;top:-20px;animation:petalFall linear infinite;opacity:0;box-shadow:0 0 5px 1px rgba(255,255,255,.6);}
@keyframes petalFall{
  0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:.55;}
  50%{transform:translateY(50vh) rotate(220deg) translateX(14px);opacity:.38;}
  100%{transform:translateY(108vh) rotate(400deg) translateX(-10px);opacity:0;}
}

/* ORNAMENTOS decorativos fijos */
.corner{position:fixed;font-size:clamp(28px,6vw,42px);color:var(--gold);opacity:.28;z-index:2;line-height:1;}
.corner-tl{top:14px;left:16px;}
.corner-tr{top:14px;right:16px;transform:scaleX(-1);}
.corner-bl{bottom:14px;left:16px;transform:scaleY(-1);}
.corner-br{bottom:14px;right:16px;transform:scale(-1);}

/* HEADER */
.header-area{
  text-align:center;margin-bottom:18px;
  opacity:0;animation:fadeUp 1s .2s forwards;
  position:relative;z-index:10;
}
.header-date{
  font-family:'Raleway',sans-serif;
  font-size:clamp(9px,2.5vw,12px);
  letter-spacing:7px;color:var(--gold);
  text-transform:uppercase;margin-bottom:5px;
}
.header-name{
  font-family:'Pinyon Script',cursive;
  font-size:clamp(72px,21vw,120px);
  font-weight:400;
  color:var(--fucsia-lila);line-height:1.05;
  text-shadow:0 2px 18px rgba(150,80,90,.28);
}
.header-subtitle{
  font-family:'Playfair Display',serif;
  font-size:clamp(14px,3.8vw,20px);
  color:var(--text2);letter-spacing:5px;margin-top:3px;
  font-style:italic;
}
.header-divider{
  width:120px;height:1px;margin:8px auto 0;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

/* ESCENA */
.scene{
  position:relative;
  width:min(88vw,460px);
  opacity:0;animation:fadeUp 1s .6s forwards;
  cursor:pointer;z-index:10;
}

/* HOJA */
.letter{
  position:absolute;
  left:13%;width:74%;
  top:26%;
  z-index:5;opacity:0;pointer-events:none;
  background:linear-gradient(175deg,var(--cream) 0%,#f8f0e4 100%);
  border-radius:3px 3px 2px 2px;
  border:1px solid rgba(201,169,110,.3);
  box-shadow:0 -4px 28px rgba(139,74,82,.12),0 2px 12px rgba(0,0,0,.06);
  min-height:56%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:7px;padding:22px 14px 24px;
  text-align:center;overflow:visible;
}
.letter::before{
  content:'';position:absolute;top:13px;left:13px;right:13px;
  height:1px;background:linear-gradient(90deg,transparent,rgba(201,169,110,.35),transparent);
}
.letter::after{
  content:'';position:absolute;bottom:13px;left:13px;right:13px;
  height:1px;background:linear-gradient(90deg,transparent,rgba(201,169,110,.35),transparent);
}
/* esquinas decorativas en la hoja */
.letter-corner{position:absolute;font-size:14px;color:var(--gold);opacity:.6;line-height:1;}
.letter-corner.tl{top:6px;left:8px;}
.letter-corner.tr{top:6px;right:8px;}
.letter-corner.bl{bottom:6px;left:8px;}
.letter-corner.br{bottom:6px;right:8px;}

.letter-crown{font-size:clamp(18px,4vw,24px);opacity:.7;}
.letter-xv{
  font-family:'Playfair Display',serif;
  font-size:clamp(38px,10vw,58px);
  font-weight:600;
  color:var(--gold);
  line-height:1;
  text-shadow:0 2px 14px rgba(201,169,110,.3);
}
.letter-name{
  font-family:'Pinyon Script',cursive;
  font-size:clamp(28px,7.5vw,42px);
  color:var(--fucsia-lila);line-height:1;
}
.letter-msg{
  font-family:'IM Fell English',serif;
  font-size:clamp(12px,3vw,15px);
  color:var(--text2);letter-spacing:1px;
  font-style:italic;line-height:1.6;
  max-width:90%;
}
.letter-date{
  font-family:'Raleway',sans-serif;
  font-size:clamp(9px,2.3vw,11px);
  letter-spacing:4px;color:var(--gold);
  text-transform:uppercase;margin-top:3px;
}

/* SVG SOBRE */
.envelope-wrap{position:relative;z-index:20;width:100%;}
.envelope-svg{width:100%;display:block;filter:drop-shadow(0 14px 36px rgba(139,74,82,.16));}
.flap{transform-box:fill-box;transform-origin:50% 0%;}

/* SELLO */
.seal-wrap{
  position:absolute;left:50%;bottom:30%;
  transform:translateX(-50%);z-index:25;
}
.seal-circle{
  width:clamp(70px,17vw,86px);height:clamp(70px,17vw,86px);
  border-radius:50%;
  background:radial-gradient(circle at 38% 35%,#a8495a,var(--seal) 55%,#3d1119);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(139,74,82,.28),inset 0 1px 3px rgba(255,255,255,.35);
  position:relative;
}
.seal-icon{font-size:clamp(20px,5vw,26px);position:relative;z-index:2;}

/* ANIMACIONES */
@keyframes flapOpen{0%{transform:rotateX(0);}100%{transform:rotateX(-175deg);}}
@keyframes sealPop{
  0%{transform:translateX(-50%) scale(1);opacity:1;}
  35%{transform:translateX(-50%) scale(1.18);opacity:.7;}
  100%{transform:translateX(-50%) scale(0);opacity:0;}
}
@keyframes letterRise{
  0%{transform:translateY(0) scale(.97);opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(-52%) scale(1);opacity:1;}
}
@keyframes envelopeExit{to{transform:scale(.88) translateY(16px);opacity:0;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

.opening .flap     {animation:flapOpen   1.1s .1s  cubic-bezier(.4,0,.2,1) forwards;}
.opening .seal-wrap{animation:sealPop    .55s .05s ease-in forwards;}
.opening .letter   {animation:letterRise 1.4s .9s  cubic-bezier(.2,.8,.3,1) forwards;}
.done              {animation:envelopeExit .55s .1s ease-in forwards;}

.scene:not(.opening) .seal-wrap{transition:transform .2s;}
.scene:hover:not(.opening) .seal-wrap{transform:translateX(-50%) scale(1.08);}

/* HINT */
.tap-hint{
  margin-top:14px;text-align:center;
  font-family:'Raleway',sans-serif;font-size:clamp(9px,2.5vw,11px);
  letter-spacing:4px;color:rgba(107,78,61,.38);text-transform:uppercase;
  opacity:0;animation:fadeUp .9s 1.2s forwards;
  position:relative;z-index:10;transition:opacity .3s;
}
.footer-text{
  margin-top:14px;text-align:center;
  font-family:'IM Fell English',serif;
  font-size:clamp(15px,3.8vw,20px);
  font-style:italic;color:var(--text2);
  opacity:0;animation:fadeUp .9s .9s forwards;
  position:relative;z-index:10;
}
#overlay{
  position:fixed;inset:0;
  background:linear-gradient(160deg,#f5ece0,#fdf8f2);
  opacity:0;pointer-events:none;z-index:100;transition:opacity .65s ease;
}
#overlay.fade-in{opacity:1;pointer-events:all;}
</style>
</head>
<body>
<div id="petals"></div>

<div id="overlay"></div>

<!-- Esquinas decorativas estilo Luis XV -->
<div class="corner corner-tl">❧</div>
<div class="corner corner-tr">❧</div>
<div class="corner corner-bl">❧</div>
<div class="corner corner-br">❧</div>

<div class="header-area">
  <p class="header-date">19 · 09 · 2026</p>
  <h1 class="header-name">Natalí</h1>
  <p class="header-subtitle" style="opacity:0;animation:fadeUp .9s .5s forwards;">Mis XV</p>
  <div class="header-divider"></div>
</div>

<div class="scene" id="scene" onclick="openEnvelope()">

  <!-- HOJA -->
  <div class="letter" id="letter">
    <span class="letter-corner tl">✦</span>
    <span class="letter-corner tr">✦</span>
    <span class="letter-corner bl">✦</span>
    <span class="letter-corner br">✦</span>
    <span class="letter-crown">👑</span>
    <span class="letter-xv">XV</span>
    <span class="letter-name">Natalí</span>
    <span class="letter-msg">Te invito a compartir<br/>la noche más especial<br/>de mi vida</span>
    <span class="letter-date">Sábado 19 de Septiembre · 2026</span>
  </div>

  <!-- SELLO -->
  <div class="seal-wrap" id="seal-wrap">
    <div class="seal-circle">
      <svg viewBox="0 0 86 86" style="position:absolute;inset:0;width:100%;height:100%;">
        <defs>
          <path id="cp" d="M43,43 m-31,0 a31,31 0 1,1 62,0 a31,31 0 1,1 -62,0"/>
        </defs>
        <text font-family="Raleway,sans-serif" font-size="6" fill="rgba(62,35,22,0.55)" letter-spacing="1.2">
          <textPath href="#cp" startOffset="2%">Tocá aquí · para ver la invitación ·</textPath>
        </text>
      </svg>
      <span class="seal-icon">🌹</span>
    </div>
  </div>

  <!-- SVG SOBRE -->
  <div class="envelope-wrap" id="envelope-wrap">
    <svg class="envelope-svg" viewBox="0 0 500 380" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="envG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f5ece0"/>
          <stop offset="100%" stop-color="#e8d8c4"/>
        </linearGradient>
        <linearGradient id="flapG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#eedfd0"/>
          <stop offset="100%" stop-color="#e0cbb8"/>
        </linearGradient>
        <filter id="sh">
          <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(139,74,82,0.13)"/>
        </filter>
      </defs>
      <!-- Cuerpo -->
      <rect x="14" y="80" width="472" height="288" rx="14" fill="url(#envG)" filter="url(#sh)"/>
      <!-- Triángulos doblez -->
      <polygon points="14,80  250,230  14,368" fill="#deccba" opacity=".5"/>
      <polygon points="486,80 250,230 486,368" fill="#deccba" opacity=".5"/>
      <polygon points="14,368 250,248 486,368" fill="#d4c0ac" opacity=".6"/>
      <!-- Líneas doblez -->
      <line x1="14"  y1="80" x2="250" y2="230" stroke="rgba(180,140,100,.2)" stroke-width="1"/>
      <line x1="486" y1="80" x2="250" y2="230" stroke="rgba(180,140,100,.2)" stroke-width="1"/>
      <!-- Detalle dorado: filete en el borde -->
      <rect x="20" y="86" width="460" height="276" rx="11" fill="none" stroke="rgba(201,169,110,.35)" stroke-width="1"/>
      <!-- FLAP -->
      <g class="flap" style="transform-origin:250px 80px;">
        <polygon points="14,82 250,220 486,82" fill="url(#flapG)"/>
        <line x1="14" y1="82" x2="486" y2="82" stroke="rgba(180,140,100,.18)" stroke-width="1"/>
        <!-- filete dorado en el flap -->
        <line x1="22" y1="89" x2="478" y2="89" stroke="rgba(201,169,110,.28)" stroke-width=".8"/>
      </g>
      <!-- Borde exterior -->
      <rect x="14" y="80" width="472" height="288" rx="14" fill="none" stroke="rgba(180,140,100,.22)" stroke-width="1.5"/>
      <!-- "Mis XV" manuscrita -->
      <text x="250" y="310" text-anchor="middle"
        font-family="'Dancing Script',cursive" font-size="34"
        fill="rgba(107,78,61,.3)" transform="rotate(-2,250,310)">Mis XV</text>
    </svg>
  </div>

</div>

<p class="tap-hint" id="tap-hint">tocá el sobre para abrirlo ✦</p>
<p class="footer-text">¡Guardamos un lugar para vos!</p>

<script>
(function(){
  const c=document.getElementById('petals');
  /* pétalos: tono rosa viejo + dorado + beige */
  const formas=[
    {w:7,h:10,br:'50% 40% 55% 35%'},  /* pétalos */
    {w:5,h:5,br:'50%'},                /* círculos */
    {w:6,h:2,br:'2px'},               /* confetti rectángulo */
  ];
  const cols=['#e8c766','#f5deb3','#fff8dc','#d4af37','#ffffff','#c0c0c0','#f0e68c'];
  for(let i=0;i<32;i++){
    const p=document.createElement('div');p.className='petal';
    const f=formas[Math.floor(Math.random()*formas.length)];
    const s=.7+Math.random()*.8;
    p.style.cssText=[
      'left:'+(Math.random()*100)+'vw',
      'width:'+(f.w*s)+'px','height:'+(f.h*s)+'px',
      'background:'+cols[Math.floor(Math.random()*cols.length)],
      'border-radius:'+f.br,
      'animation-duration:'+(6+Math.random()*8)+'s',
      'animation-delay:'+(-Math.random()*9)+'s',
    ].join(';');
    c.appendChild(p);
  }
})();

let opened=false;
function openEnvelope(){
  if(opened)return;
  opened=true;
  document.getElementById('tap-hint').style.opacity='0';
  const scene=document.getElementById('scene');
  const letter=document.getElementById('letter');
  const envWrap=document.getElementById('envelope-wrap');
  scene.classList.add('opening');
  setTimeout(()=>{letter.style.zIndex='35';envWrap.style.zIndex='15';},900);
  setTimeout(()=>{
    scene.classList.add('done');
    document.getElementById('overlay').classList.add('fade-in');
    setTimeout(()=>{window.location.href='invitacion.html';},750);
  },3500);
}
</script>
</body>
</html>
